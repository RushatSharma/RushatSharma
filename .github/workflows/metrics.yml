name: Generate GitHub Metrics

on:
  schedule:
    - cron: "0 0 * * *" # Runs daily
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # 📊 Main GitHub Metrics
      - name: Generate GitHub Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          filename: github-metrics.svg

          template: classic
          base: header, activity, community, repositories, metadata

          config_timezone: Asia/Kolkata

          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_categories: programming, markup
          plugin_languages_analysis_timeout: 15
          plugin_languages_recent_categories: programming, markup
          plugin_languages_recent_load: 300
          plugin_languages_threshold: 0%

      # ⭐ Featured Repositories
      - name: Generate Repository Highlights
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          filename: github-repositories.svg

          template: classic
          base: repositories

          plugin_repositories: yes
          plugin_repositories_featured: Sentinel,Nexus
          plugin_repositories_random: no
